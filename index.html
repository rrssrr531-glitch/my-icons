<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบแดชบอร์ดโรงเรียน</title>

  <!-- 1. Apple Touch Icons สำหรับ iOS Safari (ระบุ URL เต็มแบบ HTTPS ชัดเจน) -->
  <link rel="apple-touch-icon" href="https://rrssrr531-glitch.github.io/my-icons/rsr.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://rrssrr531-glitch.github.io/my-icons/rsr.png">
  <link rel="apple-touch-icon-precomposed" href="https://rrssrr531-glitch.github.io/my-icons/rsr.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="รยป">

  <!-- 2. Favicon ปกติ -->
  <link rel="icon" type="image/png" href="https://rrssrr531-glitch.github.io/my-icons/rsr.png">

  <!-- 3. ลิงก์ไปยัง manifest.json สำหรับ Android -->

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ⚠️ เปลี่ยนเป็น URL Web App ของ Google Apps Script ของคุณ -->
