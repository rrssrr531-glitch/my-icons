<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบแดชบอร์ดโรงเรียน</title>

  <!-- 1. Apple Touch Icons (สำหรับ iOS Safari) -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/rrssrr531-glitch/my-icons/rsr.png">
  <link rel="apple-touch-icon-precomposed" href="https://cdn.jsdelivr.net/gh/rrssrr531-glitch/my-icons/rsr.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="รยป">

  <!-- 2. Favicon ปกติ -->
  <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/rrssrr531-glitch/my-icons/rsr.png">

  <!-- 3. Manifest สำหรับ Android และ PC -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href='data:application/manifest+json,{
    "name": "ระบบแดชบอร์ดโรงเรียน",
    "short_name": "รยป",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#ffffff",
    "theme_color": "#ffffff",
    "icons": [
      {
        "src": "https://cdn.jsdelivr.net/gh/rrssrr531-glitch/my-icons/rsr.png",
        "sizes": "192x192",
        "type": "image/png"
      },
      {
        "src": "https://cdn.jsdelivr.net/gh/rrssrr531-glitch/my-icons/rsr.png",
        "sizes": "512x512",
        "type": "image/png"
      }
    ]
  }'>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- ดึง Web App จาก Google Apps Script มาแสดง -->
  <iframe src="https://script.google.com/macros/s/AKfycbxjFfsQXTpdNGrPQpMreHX5fkNIDZ8IxJnq8IbKYBliZWGr2nhA-1l4aQ-paeQvkD4/exec"></iframe>
